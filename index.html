3D\u043D\u043E: \u0438\u0437\u0434\u0435\u0440\u0436\u043A\u0438 \u0432\u044B\u0440\u0430\u0441\u0442\u0443\u0442.","\u041C\u0435\u0442\u043E\u0434 1 \u2014 \u0446\u0435\u043D\u043E\u043E\u0431\u0440\u0430\u0437\u043E\u0432\u0430\u043D\u0438\u0435 P = MC (\u043F\u043E\u0442\u043E\u043B\u043E\u043A \u0446\u0435\u043D\u044B \u0432 \u0442\u043E\u0447\u043A\u0435 \u043F\u0435\u0440\u0435\u0441\u0435\u0447\u0435\u043D\u0438\u044F MC \u0438 D): \u0430\u043B\u043B\u043E\u043A\u0430\u0442\u0438\u0432\u043D\u043E \u044D\u0444\u0444\u0435\u043A\u0442\u0438\u0432\u043D\u043E, \u043D\u043E \u0446\u0435\u043D\u0430 \u043D\u0438\u0436\u0435 ATC \u2192 \u0445\u0440\u043E\u043D\u0438\u0447\u0435\u0441\u043A\u0438\u0439 \u0443\u0431\u044B\u0442\u043E\u043A (\u043F\u043E \u043B\u0435\u043A\u0446\u0438\u0438 \u2014 \u043F\u0440\u044F\u043C\u043E\u0443\u0433\u043E\u043B\u044C\u043D\u0438\u043A \u043C\u0435\u0436\u0434\u0443 ATC \u0438 Preg), \u043D\u0443\u0436\u043D\u044B \u0434\u043E\u0442\u0430\u0446\u0438\u0438.","\u041C\u0435\u0442\u043E\u0434 2 \u2014 \u0446\u0435\u043D\u043E\u043E\u0431\u0440\u0430\u0437\u043E\u0432\u0430\u043D\u0438\u0435 P = ATC = D (\xAB\u0441\u0430\u043C\u043E\u043E\u043A\u0443\u043F\u0430\u0435\u043C\u043E\u0441\u0442\u044C\xBB, \u0441\u043F\u0440\u0430\u0432\u0435\u0434\u043B\u0438\u0432\u0430\u044F \u043F\u0440\u0438\u0431\u044B\u043B\u044C): \u043C\u043E\u043D\u043E\u043F\u043E\u043B\u0438\u0441\u0442 \u0431\u0435\u0437 \u0443\u0431\u044B\u0442\u043A\u043E\u0432 \u0438 \u043F\u0440\u0438\u0431\u044B\u043B\u0435\u0439. \u041F\u043E\u0434\u0432\u043E\u0445 (\u043F\u043E \u043B\u0435\u043A\u0446\u0438\u0438): \u043C\u043E\u043D\u043E\u043F\u043E\u043B\u0438\u0441\u0442\u0443 \u0432\u044B\u0433\u043E\u0434\u043D\u043E \u043E\u0441\u0442\u0430\u043D\u043E\u0432\u0438\u0442\u044C\u0441\u044F \u043D\u0430 QN (\u043F\u0435\u0440\u0435\u0441\u0435\u0447\u0435\u043D\u0438\u0435 MR \u0438 MC) \u0438 \u043D\u0435 \u0434\u043E\u0432\u043E\u0434\u0438\u0442\u044C \u0432\u044B\u043F\u0443\u0441\u043A \u0434\u043E Qreg \u2192 \u0432\u043E\u0437\u043D\u0438\u043A\u0430\u0435\u0442 \u0434\u0435\u0444\u0438\u0446\u0438\u0442, \u043D\u0443\u0436\u043D\u044B \u043F\u0440\u0438\u043D\u0443\u0434\u0438\u0442\u0435\u043B\u044C\u043D\u044B\u0435 \u043C\u0435\u0440\u044B. \u0422\u0435\u043C \u043D\u0435 \u043C\u0435\u043D\u0435\u0435 \u043D\u0430 \u043F\u0440\u0430\u043A\u0442\u0438\u043A\u0435 \u043F\u0440\u0435\u043E\u0431\u043B\u0430\u0434\u0430\u0435\u0442 \u0438\u043C\u0435\u043D\u043D\u043E \u0442\u0430\u0440\u0438\u0444 \xABATC + \u0441\u043F\u0440\u0430\u0432\u0435\u0434\u043B\u0438\u0432\u0430\u044F \u043F\u0440\u0438\u0431\u044B\u043B\u044C\xBB \u2014 \u0440\u0435\u0430\u043B\u044C\u043D\u044B\u0439 \u0443\u0440\u043E\u0432\u0435\u043D\u044C \u0438\u0437\u0434\u0435\u0440\u0436\u0435\u043A \u043E\u0446\u0435\u043D\u0438\u0442\u044C \u0442\u0440\u0443\u0434\u043D\u043E, \u043C\u0435\u0448\u0430\u0435\u0442 \u0438 X-\u043D\u0435\u044D\u0444\u0444\u0435\u043A\u0442\u0438\u0432\u043D\u043E\u0441\u0442\u044C.","\u041C\u0435\u0442\u043E\u0434 3 \u2014 \u0434\u0432\u0443\u0445\u0441\u0442\u0443\u043F\u0435\u043D\u0447\u0430\u0442\u044B\u0439 \u0442\u0430\u0440\u0438\u0444 (\u043A\u043E\u043C\u043F\u0440\u043E\u043C\u0438\u0441\u0441 \u043F\u043E \u043B\u0435\u043A\u0446\u0438\u0438): \u0446\u0435\u043D\u0430 \u0443\u0441\u0442\u0430\u043D\u0430\u0432\u043B\u0438\u0432\u0430\u0435\u0442\u0441\u044F \u043D\u0430 \u0443\u0440\u043E\u0432\u043D\u0435 P = MC, \u0430 \u0443\u0431\u044B\u0442\u043E\u043A \u0440\u0430\u0432\u043D\u043E\u043C\u0435\u0440\u043D\u043E \u0440\u0430\u0441\u043F\u0440\u0435\u0434\u0435\u043B\u044F\u0435\u0442\u0441\u044F \u043C\u0435\u0436\u0434\u0443 \u0432\u0441\u0435\u043C\u0438 \u043F\u043E\u043A\u0443\u043F\u0430\u0442\u0435\u043B\u044F\u043C\u0438 \u0432\u0442\u043E\u0440\u043E\u0439, \u0444\u0438\u043A\u0441\u0438\u0440\u043E\u0432\u0430\u043D\u043D\u043E\u0439 \u0447\u0430\u0441\u0442\u044C\u044E \u0442\u0430\u
